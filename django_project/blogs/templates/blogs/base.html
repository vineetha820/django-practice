{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS first -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    >

    <!-- Your custom CSS second -->
    <link rel="stylesheet" href="{% static 'blogs/main.css' %}">

    {% if title %}
        <title>Django Blog - {{ title }}</title>
    {% else %}
        <title>Django Blog</title>
    {% endif %}
</head>

<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top shadow-sm">
            <div class="container">

                <a class="navbar-brand fw-bold me-4" href="/">
                    Django Blog
                </a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarToggle"
                    aria-controls="navbarToggle"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarToggle">

                    <!-- Left Side -->
                    <div class="navbar-nav me-auto">
                        <a class="nav-link active" href="/">Home</a>
                        <a class="nav-link" href="/about">About</a>
                    </div>

                    <!-- Right Side -->
                    <div class="navbar-nav ms-auto align-items-md-center">
                        <a class="nav-link" href="#">Login</a>
                        <a class="btn btn-outline-light btn-sm ms-md-3 mt-2 mt-md-0" href="#">
                            Register
                        </a>
                    </div>

                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main role="main" class="container main-content">
        <div class="row g-4">

            <!-- Blog Posts Area -->
            <div class="col-lg-8 col-md-12">
                {% block content %}{% endblock %}
            </div>

            <!-- Sidebar -->
            <div class="col-lg-4 col-md-12">
                <div class="card sidebar-card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title fw-bold mb-3">
                            Our Sidebar
                        </h5>

                        <p class="text-muted mb-3">
                            You can put any information here you'd like.
                        </p>

                        <ul class="list-group list-group-flush">
                            <li class="list-group-item px-0">Latest Posts</li>
                            <li class="list-group-item px-0">Announcements</li>
                            <li class="list-group-item px-0">Calendars</li>
                            <li class="list-group-item px-0">etc</li>
                        </ul>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle only -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
    </script>

</body>
</html>
